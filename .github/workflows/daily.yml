name: daily-suggestions

# Manual/backup runner for the suggestions engine. The scheduled cron is DISABLED on purpose:
# GitHub's datacenter IP is blocked by Screener, so a cron run comes back single-source and thin.
# In production the APP drives the daily refresh (Streamlit Cloud can reach Screener). This
# workflow stays for manual dispatch / debugging. Secrets are configured in repo settings.
on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/daily_suggestions.py
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_TOKEN: ${{ secrets.APPS_SCRIPT_TOKEN }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          POSITION_CAP: "0.25"
