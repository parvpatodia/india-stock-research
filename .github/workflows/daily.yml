name: daily-suggestions

# Runs the long-term suggestions engine every morning and on demand. Writes a "Today" tab to the
# Sheet and pushes the top picks to ntfy. Secrets are configured in the repo settings, never here.
on:
  schedule:
    - cron: "30 3 * * *"   # 03:30 UTC = 09:00 IST
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/daily_suggestions.py
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_TOKEN: ${{ secrets.APPS_SCRIPT_TOKEN }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          POSITION_CAP: "0.25"
